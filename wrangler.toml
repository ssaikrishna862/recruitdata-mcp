name = "recruitdata-mcp"
main = "src/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "RecruitDataMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RecruitDataMCP"]

# Proprietary dataset archive — every fetched job is saved here, compounding daily.
[[d1_databases]]
binding = "ARCHIVE"
database_name = "datapulse-archive"
database_id = "b7a0e3f4-7db9-4189-8bc3-6c77509dfa91"
